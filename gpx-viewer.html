<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERRAIN // GPX Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root {
    --ink: #0a0c0f;
    --paper: #f2ede6;
    --accent: #d4500a;
    --accent2: #1a6b4a;
    --muted: #8a8278;
    --panel-bg: rgba(10, 12, 15, 0.88);
    --border: rgba(212, 80, 10, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* === HEADER === */
  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 18px 24px 0;
    pointer-events: none;
  }

  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.12em;
    color: var(--paper);
    line-height: 1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }

  .wordmark span {
    color: var(--accent);
  }

  /* === MAP === */
  #map {
    width: 100%;
    height: 100vh;
  }

  /* === DROP ZONE OVERLAY === */
  #drop-overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 12, 15, 0.82);
    backdrop-filter: blur(4px);
    transition: opacity 0.4s ease;
  }

  #drop-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .drop-box {
    border: 1.5px solid var(--accent);
    padding: 52px 64px;
    text-align: center;
    position: relative;
    background: rgba(212, 80, 10, 0.04);
    animation: pulse-border 2.8s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: rgba(212, 80, 10, 0.4); box-shadow: 0 0 0 0 rgba(212, 80, 10, 0); }
    50% { border-color: rgba(212, 80, 10, 0.9); box-shadow: 0 0 32px 4px rgba(212, 80, 10, 0.12); }
  }

  .drop-box::before, .drop-box::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--accent);
    border-style: solid;
  }
  .drop-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .drop-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .drop-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 0.1em;
    color: var(--paper);
    line-height: 1;
    margin-bottom: 10px;
  }

  .drop-sub {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .file-btn {
    display: inline-block;
    background: var(--accent);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 28px;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }

  .file-btn:hover { background: #b8420a; }

  #file-input { display: none; }

  .drop-hint {
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(138, 130, 120, 0.6);
  }

  /* === DRAG ACTIVE === */
  body.drag-active #drop-overlay {
    background: rgba(10, 12, 15, 0.92);
  }
  body.drag-active .drop-box {
    border-color: var(--accent);
    background: rgba(212, 80, 10, 0.08);
  }

  /* === STATS PANEL === */
  #stats-panel {
    position: absolute;
    bottom: 24px;
    left: 24px;
    z-index: 10;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    padding: 20px 24px;
    min-width: 240px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }

  #stats-panel.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .stats-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stats-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    gap: 24px;
  }

  .stat-key {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-val {
    font-size: 15px;
    font-weight: 500;
    color: var(--paper);
    letter-spacing: 0.04em;
  }

  .stat-unit {
    font-size: 9px;
    color: var(--muted);
    margin-left: 3px;
  }

  .track-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--paper);
    margin-bottom: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  /* === ELEVATION CHART === */
  #elev-panel {
    position: absolute;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    padding: 16px 20px 12px;
    width: 340px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s;
    pointer-events: none;
  }

  #elev-panel.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .elev-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .elev-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(26, 107, 74, 0.3);
  }

  #elev-canvas {
    width: 100%;
    height: 80px;
    display: block;
  }

  /* === CONTROLS === */
  #ctrl-panel {
    position: absolute;
    top: 64px;
    right: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-btn {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .ctrl-btn:hover {
    background: rgba(212, 80, 10, 0.15);
    border-color: var(--accent);
  }

  /* === API KEY INPUT === */
  #api-panel {
    position: absolute;
    top: 64px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #api-panel.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #api-panel label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  #api-key-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212,80,10,0.25);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    width: 200px;
    outline: none;
  }

  #api-key-input:focus { border-color: var(--accent); }

  .apply-btn {
    background: var(--accent);
    border: none;
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
  }

  /* === MAPLIBRE overrides === */
  .maplibregl-ctrl-attrib { font-size: 9px !important; }
  .maplibregl-ctrl-attrib-inner a { color: var(--muted) !important; }
</style>
</head>
<body>

<header>
  <div class="wordmark">TERRAIN<span>//</span>GPX</div>
</header>

<div id="map"></div>

<!-- Drop Overlay -->
<div id="drop-overlay">
  <div class="drop-box">
    <div class="drop-title">Load a GPX File</div>
    <div class="drop-sub">Drag &amp; drop anywhere, or browse</div>
    <label class="file-btn" for="file-input">Browse files</label>
    <input type="file" id="file-input" accept=".gpx">
    <div class="drop-hint">Supports GPX 1.0 &amp; 1.1 — tracks, routes, waypoints</div>
  </div>
</div>

<!-- Stats Panel -->
<div id="stats-panel">
  <div class="track-name" id="track-name">—</div>
  <div class="stats-label">Track Stats</div>
  <div class="stat-row">
    <span class="stat-key">Distance</span>
    <span class="stat-val" id="s-dist">—<span class="stat-unit">km</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-key">Elev. Gain</span>
    <span class="stat-val" id="s-gain">—<span class="stat-unit">m</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-key">Elev. Loss</span>
    <span class="stat-val" id="s-loss">—<span class="stat-unit">m</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-key">Max Elev.</span>
    <span class="stat-val" id="s-max">—<span class="stat-unit">m</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-key">Min Elev.</span>
    <span class="stat-val" id="s-min">—<span class="stat-unit">m</span></span>
  </div>
  <div class="stat-row">
    <span class="stat-key">Points</span>
    <span class="stat-val" id="s-pts">—</span>
  </div>
</div>

<!-- Elevation Chart -->
<div id="elev-panel">
  <div class="elev-label">Elevation Profile</div>
  <canvas id="elev-canvas"></canvas>
</div>

<!-- Controls -->
<div id="ctrl-panel">
  <button class="ctrl-btn" id="btn-3d">⬛ 3D Terrain</button>
  <button class="ctrl-btn" id="btn-fit">⊙ Fit Track</button>
  <button class="ctrl-btn" id="btn-reset">⟳ Load New</button>
  <button class="ctrl-btn" id="btn-apikey">🔑 API Key</button>
</div>

<!-- API Key Panel -->
<div id="api-panel">
  <label for="api-key-input">MapTiler API Key</label>
  <input type="text" id="api-key-input" placeholder="Get free key at maptiler.com">
  <button class="apply-btn" id="btn-apply-key">Apply</button>
</div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let map;
let trackData = null;
let terrain3d = false;
let apiKey = localStorage.getItem('maptiler_key') || '';

// ─────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────
function buildStyle(key) {
  if (key) {
    return `https://api.maptiler.com/maps/outdoor-v2/style.json?key=${key}`;
  }
  // Fallback: OpenFreeMap (no key required)
  return 'https://tiles.openfreemap.org/styles/liberty';
}

function initMap() {
  if (map) map.remove();

  map = new maplibregl.Map({
    container: 'map',
    style: buildStyle(apiKey),
    center: [0, 20],
    zoom: 2,
    pitch: 0,
    bearing: 0,
    antialias: true
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-left');

  map.on('load', () => {
    if (apiKey) setupTerrain();
    if (trackData) renderTrack();
  });
}

function setupTerrain() {
  if (!apiKey) return;
  if (!map.getSource('terrain-src')) {
    map.addSource('terrain-src', {
      type: 'raster-dem',
      url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${apiKey}`,
      tileSize: 256
    });
  }
}

// ─────────────────────────────────────────────
// TERRAIN TOGGLE
// ─────────────────────────────────────────────
document.getElementById('btn-3d').addEventListener('click', () => {
  terrain3d = !terrain3d;
  const btn = document.getElementById('btn-3d');

  if (terrain3d) {
    if (!apiKey) {
      alert('3D terrain requires a MapTiler API key.\nGet a free one at maptiler.com, then click the 🔑 button.');
      terrain3d = false;
      return;
    }
    setupTerrain();
    map.setTerrain({ source: 'terrain-src', exaggeration: 1.5 });
    map.easeTo({ pitch: 60, duration: 800 });
    btn.textContent = '◼ Flat Map';
  } else {
    map.setTerrain(null);
    map.easeTo({ pitch: 0, duration: 600 });
    btn.textContent = '⬛ 3D Terrain';
  }
});

// ─────────────────────────────────────────────
// GPX PARSING
// ─────────────────────────────────────────────
function parseGPX(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');

  const name =
    doc.querySelector('trk > name')?.textContent ||
    doc.querySelector('rte > name')?.textContent ||
    doc.querySelector('metadata > name')?.textContent ||
    'Unnamed Track';

  let points = [];

  // Try trkpt (track points)
  const trkpts = doc.querySelectorAll('trkpt');
  if (trkpts.length > 0) {
    trkpts.forEach(pt => {
      const lat = parseFloat(pt.getAttribute('lat'));
      const lon = parseFloat(pt.getAttribute('lon'));
      const ele = parseFloat(pt.querySelector('ele')?.textContent || 0);
      if (!isNaN(lat) && !isNaN(lon)) points.push([lon, lat, ele]);
    });
  }

  // Fallback: rtept (route points)
  if (points.length === 0) {
    doc.querySelectorAll('rtept').forEach(pt => {
      const lat = parseFloat(pt.getAttribute('lat'));
      const lon = parseFloat(pt.getAttribute('lon'));
      const ele = parseFloat(pt.querySelector('ele')?.textContent || 0);
      if (!isNaN(lat) && !isNaN(lon)) points.push([lon, lat, ele]);
    });
  }

  // Waypoints as fallback
  if (points.length === 0) {
    doc.querySelectorAll('wpt').forEach(pt => {
      const lat = parseFloat(pt.getAttribute('lat'));
      const lon = parseFloat(pt.getAttribute('lon'));
      const ele = parseFloat(pt.querySelector('ele')?.textContent || 0);
      if (!isNaN(lat) && !isNaN(lon)) points.push([lon, lat, ele]);
    });
  }

  return { name, points };
}

// ─────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────
function haversine([lon1, lat1], [lon2, lat2]) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function computeStats(points) {
  let dist = 0, gain = 0, loss = 0;
  let elevs = points.map(p => p[2]);
  let maxE = Math.max(...elevs), minE = Math.min(...elevs);

  for (let i = 1; i < points.length; i++) {
    dist += haversine(points[i-1], points[i]);
    const de = points[i][2] - points[i-1][2];
    if (de > 0) gain += de;
    else loss += Math.abs(de);
  }

  return { dist, gain, loss, maxE, minE, pts: points.length, elevs };
}

function showStats(name, stats) {
  document.getElementById('track-name').textContent = name;
  document.getElementById('s-dist').innerHTML = stats.dist.toFixed(2) + '<span class="stat-unit">km</span>';
  document.getElementById('s-gain').innerHTML = Math.round(stats.gain) + '<span class="stat-unit">m</span>';
  document.getElementById('s-loss').innerHTML = Math.round(stats.loss) + '<span class="stat-unit">m</span>';
  document.getElementById('s-max').innerHTML = Math.round(stats.maxE) + '<span class="stat-unit">m</span>';
  document.getElementById('s-min').innerHTML = Math.round(stats.minE) + '<span class="stat-unit">m</span>';
  document.getElementById('s-pts').textContent = stats.pts.toLocaleString();
  document.getElementById('stats-panel').classList.add('visible');
}

// ─────────────────────────────────────────────
// ELEVATION CHART
// ─────────────────────────────────────────────
function drawElevation(elevs) {
  const canvas = document.getElementById('elev-canvas');
  const panel = document.getElementById('elev-panel');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 40;
  const H = 80;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const minE = Math.min(...elevs);
  const maxE = Math.max(...elevs);
  const range = maxE - minE || 1;
  const n = elevs.length;

  // Background grid lines
  ctx.strokeStyle = 'rgba(212,80,10,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (i / 4) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Fill gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(26, 107, 74, 0.55)');
  grad.addColorStop(1, 'rgba(26, 107, 74, 0.02)');

  ctx.beginPath();
  elevs.forEach((e, i) => {
    const x = (i / (n - 1)) * W;
    const y = H - ((e - minE) / range) * H * 0.9 - H * 0.05;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  elevs.forEach((e, i) => {
    const x = (i / (n - 1)) * W;
    const y = H - ((e - minE) / range) * H * 0.9 - H * 0.05;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = 'rgba(26, 107, 74, 0.9)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  panel.classList.add('visible');
}

// ─────────────────────────────────────────────
// RENDER TRACK ON MAP
// ─────────────────────────────────────────────
function renderTrack() {
  if (!trackData || !map.isStyleLoaded()) return;

  const { points } = trackData;
  const coords2d = points.map(p => [p[0], p[1]]);
  const geojson = {
    type: 'FeatureCollection',
    features: [{
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: coords2d }
    }]
  };

  // Remove existing
  ['gpx-track', 'gpx-track-glow', 'gpx-start', 'gpx-end'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  ['gpx-line', 'gpx-pts'].forEach(id => {
    if (map.getSource(id)) map.removeSource(id);
  });

  map.addSource('gpx-line', { type: 'geojson', data: geojson });

  // Glow
  map.addLayer({
    id: 'gpx-track-glow',
    type: 'line',
    source: 'gpx-line',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: { 'line-color': '#d4500a', 'line-width': 8, 'line-opacity': 0.25, 'line-blur': 4 }
  });

  // Track
  map.addLayer({
    id: 'gpx-track',
    type: 'line',
    source: 'gpx-line',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: { 'line-color': '#f06030', 'line-width': 2.5, 'line-opacity': 0.95 }
  });

  // Start/end markers
  const markerGeoJSON = (coord, color) => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: coord }
  });

  const startEl = document.createElement('div');
  startEl.style.cssText = 'width:10px;height:10px;border-radius:50%;background:#1a6b4a;border:2px solid #f2ede6;box-shadow:0 0 8px rgba(26,107,74,0.8)';
  new maplibregl.Marker({ element: startEl }).setLngLat(coords2d[0]).addTo(map);

  const endEl = document.createElement('div');
  endEl.style.cssText = 'width:10px;height:10px;border-radius:50%;background:#d4500a;border:2px solid #f2ede6;box-shadow:0 0 8px rgba(212,80,10,0.8)';
  new maplibregl.Marker({ element: endEl }).setLngLat(coords2d[coords2d.length - 1]).addTo(map);

  // Fit bounds
  fitTrack(coords2d);
}

function fitTrack(coords) {
  const lons = coords.map(c => c[0]);
  const lats = coords.map(c => c[1]);
  map.fitBounds(
    [[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]],
    { padding: 80, duration: 1200, pitch: terrain3d ? 55 : 0 }
  );
}

// ─────────────────────────────────────────────
// LOAD GPX
// ─────────────────────────────────────────────
function loadGPX(text) {
  const parsed = parseGPX(text);
  if (parsed.points.length === 0) {
    alert('No track points found in this GPX file.');
    return;
  }

  trackData = parsed;
  const stats = computeStats(parsed.points);

  document.getElementById('drop-overlay').classList.add('hidden');
  showStats(parsed.name, stats);
  drawElevation(stats.elevs);

  if (map.isStyleLoaded()) {
    renderTrack();
  } else {
    map.once('load', renderTrack);
  }
}

// ─────────────────────────────────────────────
// FILE INPUT
// ─────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadGPX(ev.target.result);
  reader.readAsText(file);
});

// ─────────────────────────────────────────────
// DRAG & DROP
// ─────────────────────────────────────────────
document.body.addEventListener('dragover', e => {
  e.preventDefault();
  document.body.classList.add('drag-active');
  document.getElementById('drop-overlay').classList.remove('hidden');
});

document.body.addEventListener('dragleave', e => {
  if (e.relatedTarget === null) document.body.classList.remove('drag-active');
});

document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.body.classList.remove('drag-active');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.gpx')) {
    const reader = new FileReader();
    reader.onload = ev => loadGPX(ev.target.result);
    reader.readAsText(file);
  } else {
    alert('Please drop a .gpx file.');
  }
});

// ─────────────────────────────────────────────
// CONTROL BUTTONS
// ─────────────────────────────────────────────
document.getElementById('btn-fit').addEventListener('click', () => {
  if (!trackData) return;
  const coords = trackData.points.map(p => [p[0], p[1]]);
  fitTrack(coords);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  trackData = null;
  document.getElementById('drop-overlay').classList.remove('hidden');
  document.getElementById('stats-panel').classList.remove('visible');
  document.getElementById('elev-panel').classList.remove('visible');
  ['gpx-track', 'gpx-track-glow'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  if (map.getSource('gpx-line')) map.removeSource('gpx-line');
  // Remove markers
  document.querySelectorAll('.maplibregl-marker').forEach(m => m.remove());
  document.getElementById('file-input').value = '';
});

// API Key Panel
document.getElementById('btn-apikey').addEventListener('click', () => {
  const panel = document.getElementById('api-panel');
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible') && apiKey) {
    document.getElementById('api-key-input').value = apiKey;
  }
});

document.getElementById('btn-apply-key').addEventListener('click', () => {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  apiKey = key;
  localStorage.setItem('maptiler_key', key);
  document.getElementById('api-panel').classList.remove('visible');
  initMap(); // Re-init with new key for outdoor style
});

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
initMap();

// Pre-fill API key input if stored
if (apiKey) {
  document.getElementById('api-key-input').value = apiKey;
}
</script>
</body>
</html>
